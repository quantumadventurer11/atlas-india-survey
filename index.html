<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas India — Policy Survey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>/* Atlas India Survey — survey.css */
:root {
  --pink:    #E6007E;
  --gold:    #F9B233;
  --dark:    #111111;
  --dark2:   #1E1E1E;
  --mid:     #3a3a3a;
  --muted:   #777;
  --border:  #e2e2e0;
  --bg:      #F7F6F2;
  --card:    #FFFFFF;
  --yes-bg:  #E8F5E9; --yes-bd: #388E3C; --yes-tx: #1B5E20;
  --no-bg:   #FCE4EC; --no-bd:  #D81B60; --no-tx:  #880E4F;
  --radius:  12px;
  --shadow:  0 2px 16px rgba(0,0,0,0.07);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
}

/* Grain overlay */
.grain {
  position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

/* HEADER */
.site-header {
  position: relative; overflow: hidden;
  background: var(--dark); color: #fff;
}
.header-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #1a0a0a 0%, #1a1a1a 50%, #0a1a1a 100%);
}
.header-bg::after {
  content: '';
  position: absolute; top: -40%; right: -10%;
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(249,178,51,0.12) 0%, transparent 70%);
}
.header-inner {
  position: relative; z-index: 1;
  max-width: 860px; margin: 0 auto;
  padding: 1.5rem 2rem;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-mark {
  font-size: 1.5rem; color: var(--gold);
  filter: drop-shadow(0 0 8px rgba(249,178,51,0.4));
}
.logo-name { display: block; font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.04em; }
.logo-tag  { display: block; font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.06em; }
.results-link {
  font-size: 13px; color: rgba(255,255,255,0.5); text-decoration: none;
  transition: color 0.2s;
}
.results-link:hover { color: var(--gold); }

.header-hero {
  position: relative; z-index: 1;
  max-width: 860px; margin: 0 auto;
  padding: 2rem 2rem 3rem;
}
.header-hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3rem, 8vw, 5.5rem);
  font-weight: 600; line-height: 1.0;
  color: #fff; letter-spacing: -0.02em;
}
.header-hero h1 em {
  font-style: italic; color: var(--gold);
}
.hero-sub {
  margin-top: 1rem;
  font-size: 14px; color: rgba(255,255,255,0.4);
  letter-spacing: 0.05em; text-transform: uppercase;
}
.site-header.compact .header-hero { padding-bottom: 2rem; }
.site-header.compact h1 { font-size: clamp(2rem, 5vw, 3.5rem); }

/* PROGRESS */
.progress-rail {
  background: var(--dark2);
  display: flex; align-items: center; gap: 1rem;
  padding: 0.6rem 2rem;
  position: sticky; top: 0; z-index: 100;
}
.progress-bar {
  height: 2px; background: linear-gradient(90deg, var(--gold), var(--pink));
  border-radius: 2px; transition: width 0.4s ease; width: 0%;
  flex: 1;
}
.progress-label { font-size: 11px; color: rgba(255,255,255,0.35); white-space: nowrap; }

/* MAIN CONTENT */
.survey-main, .results-main {
  max-width: 860px; margin: 0 auto;
  padding: 2.5rem 2rem 5rem;
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

/* INTRO */
.intro-card { padding: 2.5rem; }
.intro-eyebrow {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--pink); margin-bottom: 1rem;
}
.intro-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.5rem, 4vw, 2.25rem);
  font-weight: 600; line-height: 1.2;
  color: var(--dark); margin-bottom: 1.5rem;
}
.intro-body { font-size: 15px; color: var(--mid); line-height: 1.7; margin-bottom: 1rem; }
.intro-steps {
  display: flex; flex-direction: column; gap: 1rem;
  border-left: 2px solid var(--gold); padding-left: 1.5rem;
  margin: 1.5rem 0;
}
.step { display: flex; gap: 1rem; align-items: flex-start; }
.step-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem; font-weight: 700; color: var(--gold);
  line-height: 1; min-width: 28px;
}
.step { font-size: 14px; color: var(--mid); line-height: 1.6; }
.step strong { color: var(--dark); }

.name-field { margin-top: 2rem; }
.name-field label {
  display: block; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted); margin-bottom: 8px;
}
.req { color: var(--pink); }
.name-field input {
  width: 100%; padding: 12px 16px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 15px; font-family: 'DM Sans', sans-serif;
  color: var(--dark); background: var(--bg);
  outline: none; transition: border-color 0.2s;
}
.name-field input:focus { border-color: var(--pink); }

.intro-actions { margin-top: 1.5rem; }
.intro-note { font-size: 12px; color: var(--muted); margin-top: 1.5rem; }

/* BUTTONS */
.btn-primary {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 11px 24px; border-radius: 8px;
  background: var(--pink); color: #fff;
  border: none; font-size: 14px; font-weight: 500;
  font-family: 'DM Sans', sans-serif; cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.btn-primary:hover { background: #c7006d; }
.btn-primary:active { transform: scale(0.98); }

.btn-secondary {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 11px 20px; border-radius: 8px;
  background: transparent; color: var(--mid);
  border: 1.5px solid var(--border);
  font-size: 14px; font-weight: 500;
  font-family: 'DM Sans', sans-serif; cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.btn-secondary:hover { background: #f5f5f5; border-color: #ccc; }
.btn-secondary:disabled { opacity: 0.3; cursor: not-allowed; }

/* PAGE HEADER */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.5rem;
}
.page-cat-strip { display: flex; gap: 6px; flex-wrap: wrap; }
.cat-chip {
  display: inline-block;
  padding: 4px 12px; border-radius: 20px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
  background: color-mix(in srgb, var(--chip-color) 12%, white);
  color: var(--chip-color);
  border: 1px solid color-mix(in srgb, var(--chip-color) 30%, white);
}
.page-counter { font-size: 12px; color: var(--muted); }

/* QUESTION CARD */
.qcard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 12px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.qcard:hover { box-shadow: var(--shadow); }
.qcard--done { border-left: 3px solid var(--pink); }
.qcard-head { display: flex; gap: 16px; margin-bottom: 1.25rem; }
.qcard-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem; font-weight: 700; color: var(--muted);
  min-width: 26px; padding-top: 1px;
}
.qcard-text { font-size: 15px; line-height: 1.6; color: var(--dark); }

.qcard-controls {
  display: grid;
  grid-template-columns: auto 1fr 1fr;
  gap: 1.5rem;
  padding-left: 42px;
}
.ctrl-group {}
.ctrl-label {
  display: block; font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted); margin-bottom: 8px;
}
.ctrl-hint { font-weight: 300; text-transform: none; letter-spacing: 0; }

/* YES/NO */
.yn-group { display: flex; gap: 6px; }
.yn-btn {
  flex: 1; padding: 8px 10px; border-radius: 8px;
  border: 1.5px solid var(--border); background: transparent;
  font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
  color: var(--muted); cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
}
.yn-btn:hover { border-color: var(--dark); color: var(--dark); }
.yn-yes.yn-active { background: var(--yes-bg); border-color: var(--yes-bd); color: var(--yes-tx); }
.yn-no.yn-active  { background: var(--no-bg);  border-color: var(--no-bd);  color: var(--no-tx); }
.yn-icon { font-size: 11px; }

/* SCALE */
.scale-group { display: flex; gap: 5px; }
.scale-btn {
  flex: 1; padding: 8px 4px; border-radius: 7px; text-align: center;
  border: 1.5px solid var(--border); background: transparent;
  font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
  color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.scale-btn:hover { border-color: var(--dark); color: var(--dark); }
.scale-u.scale-active { background: #fff3e0; border-color: var(--gold); color: #7c4d00; }
.scale-i.scale-active { background: var(--no-bg); border-color: var(--pink); color: var(--no-tx); }

/* Quadrant label inline */
.qcard-quadrant {
  margin-top: 10px; padding-left: 42px;
  font-size: 11px; color: var(--pink); font-weight: 500;
}

/* NAV */
.survey-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border);
}
.nav-info { font-size: 13px; color: var(--muted); }

/* DONE */
.done-card { padding: 2.5rem; text-align: center; margin-bottom: 2rem; }
.done-check {
  width: 60px; height: 60px; border-radius: 50%;
  background: var(--yes-bg); color: var(--yes-tx);
  font-size: 1.5rem; display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.25rem;
}
.done-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem; color: var(--dark); margin-bottom: 0.5rem;
}
.done-sub { font-size: 15px; color: var(--muted); }

/* EISENHOWER MATRIX */
.matrix-section { margin-bottom: 2.5rem; }
.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.75rem; color: var(--dark); margin-bottom: 0.25rem;
}
.section-sub { font-size: 13px; color: var(--muted); }
.section-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.5rem;
}
.matrix-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  margin-top: 1.25rem;
}
.quad { border-radius: var(--radius); padding: 1.25rem; min-height: 160px; }
.quad-q1 { background: #fff5f5; border: 1px solid #ffcdd2; }
.quad-q2 { background: #f0f4ff; border: 1px solid #bbcfea; }
.quad-q3 { background: #fffde7; border: 1px solid #f5e642; }
.quad-q4 { background: #f1f8e9; border: 1px solid #c5e1a5; }

.quad-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 0.75rem; flex-wrap: wrap;
}
.quad-tag {
  font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 20px; letter-spacing: 0.06em;
}
.quad-q1 .quad-tag { background: #ffcdd2; color: #c62828; }
.quad-q2 .quad-tag { background: #bbdefb; color: #1565c0; }
.quad-q3 .quad-tag { background: #fff176; color: #f57f17; }
.quad-q4 .quad-tag { background: #c5e1a5; color: #2e7d32; }
.quad-header strong { font-size: 13px; font-weight: 600; }
.quad-q1 strong { color: #c62828; }
.quad-q2 strong { color: #1565c0; }
.quad-q3 strong { color: #f57f17; }
.quad-q4 strong { color: #2e7d32; }
.quad-sub { font-size: 10px; color: var(--muted); }

.quad-item {
  font-size: 12px; color: var(--mid); line-height: 1.5;
  padding: 5px 0; border-bottom: 0.5px solid rgba(0,0,0,0.06);
}
.quad-item:last-child { border-bottom: none; }
.quad-empty { font-size: 12px; color: var(--muted); font-style: italic; }

/* LOADING */
.loading-state {
  text-align: center; padding: 4rem 2rem; color: var(--muted);
}
.spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid var(--border); border-top-color: var(--pink);
  animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* RESPONSIVE */
@media (max-width: 620px) {
  .header-inner { padding: 1.25rem 1rem; }
  .header-hero  { padding: 1.5rem 1rem 2rem; }
  .survey-main, .results-main { padding: 1.5rem 1rem 4rem; }
  .qcard-controls { grid-template-columns: 1fr; gap: 1rem; padding-left: 0; }
  .matrix-grid { grid-template-columns: 1fr; }
  .survey-nav { flex-direction: column; gap: 0.75rem; align-items: stretch; }
  .survey-nav .btn-primary, .survey-nav .btn-secondary { justify-content: center; }
}
</style>
</head>

let state = {
  page: 0,
  memberName: '',
  answers: {}
};

try {
  const saved = sessionStorage.getItem(STORAGE_KEY);
  if (saved) state = JSON.parse(saved);
} catch(e) {}

function save() {
  try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function totalQuestionPages() { return Math.ceil(QUESTIONS.length / PAGE_SIZE); }
function questionsOnPage(p)   { return QUESTIONS.slice((p-1)*PAGE_SIZE, p*PAGE_SIZE); }
function isAnswered(q)        { const a=state.answers[q.id]; return a&&a.yn&&a.urgency&&a.importance; }
function countAnswered()      { return QUESTIONS.filter(isAnswered).length; }

function getQuadrant(urgency, importance) {
  const u=Number(urgency), i=Number(importance);
  if (u>=3&&i>=3) return 'Q1 — Do First';
  if (u<3 &&i>=3) return 'Q2 — Schedule';
  if (u>=3&&i<3)  return 'Q3 — Delegate';
  return 'Q4 — Deprioritise';
}

function updateProgress() {
  const n = countAnswered();
  document.getElementById('progressBar').style.width = (n/QUESTIONS.length*100)+'%';
  document.getElementById('progressLabel').textContent = `${n} of ${QUESTIONS.length} answered`;
}

function render() {
  updateProgress();
  const main = document.getElementById('surveyMain');
  if (state.page === 0) renderIntro(main);
  else if (state.page <= totalQuestionPages()) renderQuestions(main);
  else renderDone(main);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderIntro(main) {
  main.innerHTML = `
    <div class="intro-card card">
      <div class="intro-eyebrow">Internal Team Survey</div>
      <h2 class="intro-title">Welcome to the Atlas India<br>Policy Position Survey</h2>
      <p class="intro-body">For each of the 50 policy questions, you will:</p>
      <div class="intro-steps">
        <div class="step"><span class="step-num">01</span><div><strong>State your position</strong><br>Yes or No on each policy question</div></div>
        <div class="step"><span class="step-num">02</span><div><strong>Rate urgency</strong> (1–4)<br>4 = immediately needed</div></div>
        <div class="step"><span class="step-num">03</span><div><strong>Rate importance</strong> (1–4)<br>4 = critically important to India's future</div></div>
      </div>
      <p class="intro-body" style="margin-top:1.5rem">Your ratings generate a personal <strong>Eisenhower Priority Matrix</strong> and feed into the team's aggregated results — stored securely in Airtable.</p>
      <div class="name-field">
        <label for="nameInput">Your full name <span class="req">*</span></label>
        <input type="text" id="nameInput" placeholder="Enter your name" value="${escHtml(state.memberName)}" autocomplete="name">
      </div>
      <div class="intro-actions">
        <button class="btn-primary" onclick="startSurvey()">Begin Survey →</button>
      </div>
      <p class="intro-note">Confidential · Internal use only · atlasmovement.org</p>
    </div>`;
}

function renderQuestions(main) {
  const qs = questionsOnPage(state.page);
  const totalPages = totalQuestionPages();
  const cats = [...new Set(qs.map(q => q.cat))];

  let html = `<div class="page-header">
    <div class="page-cat-strip">
      ${cats.map(cat=>`<span class="cat-chip" style="--chip-color:${CAT_COLORS[cat]||'#888'}">${cat}</span>`).join('')}
    </div>
    <span class="page-counter">Page ${state.page} of ${totalPages}</span>
  </div>`;

  qs.forEach(q => {
    const a = state.answers[q.id] || {};
    const done = isAnswered(q);
    html += `
    <div class="qcard${done?' qcard--done':''}">
      <div class="qcard-head">
        <span class="qcard-num">${q.id}</span>
        <p class="qcard-text">${escHtml(q.text)}</p>
      </div>
      <div class="qcard-controls">
        <div class="ctrl-group">
          <span class="ctrl-label">Position</span>
          <div class="yn-group">
            <button class="yn-btn yn-yes${a.yn==='yes'?' yn-active':''}" onclick="setAnswer(${q.id},'yn','yes')"><span class="yn-icon">✓</span> Yes</button>
            <button class="yn-btn yn-no${a.yn==='no'?' yn-active':''}"  onclick="setAnswer(${q.id},'yn','no')"><span class="yn-icon">✗</span> No</button>
          </div>
        </div>
        <div class="ctrl-group">
          <span class="ctrl-label">Urgency <span class="ctrl-hint">1=low · 4=high</span></span>
          <div class="scale-group">
            ${[1,2,3,4].map(v=>`<button class="scale-btn scale-u${a.urgency==v?' scale-active':''}" onclick="setAnswer(${q.id},'urgency',${v})">${v}</button>`).join('')}
          </div>
        </div>
        <div class="ctrl-group">
          <span class="ctrl-label">Importance <span class="ctrl-hint">1=low · 4=high</span></span>
          <div class="scale-group">
            ${[1,2,3,4].map(v=>`<button class="scale-btn scale-i${a.importance==v?' scale-active':''}" onclick="setAnswer(${q.id},'importance',${v})">${v}</button>`).join('')}
          </div>
        </div>
      </div>
      ${done?`<div class="qcard-quadrant">→ ${getQuadrant(a.urgency,a.importance)}</div>`:''}
    </div>`;
  });

  const isLast = state.page === totalPages;
  html += `
  <div class="survey-nav">
    <button class="btn-secondary" onclick="goPage(-1)" ${state.page<=1?'disabled':''}>← Back</button>
    <span class="nav-info">${countAnswered()} / ${QUESTIONS.length} answered</span>
    ${isLast
      ? `<button class="btn-primary" onclick="goSubmit()">Submit Responses →</button>`
      : `<button class="btn-primary" onclick="goPage(1)">Next →</button>`}
  </div>`;

  main.innerHTML = html;
}

function renderDone(main) {
  const rated = QUESTIONS.map(q=>({q,a:state.answers[q.id]||{}})).filter(({a})=>a.urgency&&a.importance);
  const q1=rated.filter(({a})=>Number(a.urgency)>=3&&Number(a.importance)>=3);
  const q2=rated.filter(({a})=>Number(a.urgency)<3 &&Number(a.importance)>=3);
  const q3=rated.filter(({a})=>Number(a.urgency)>=3&&Number(a.importance)<3);
  const q4=rated.filter(({a})=>Number(a.urgency)<3 &&Number(a.importance)<3);
  const fn=arr=>arr.length?arr.map(({q})=>`<div class="quad-item">${q.text.length>72?q.text.slice(0,72)+'…':q.text}</div>`).join(''):`<span class="quad-empty">No items</span>`;

  main.innerHTML = `
  <div class="done-card card">
    <div class="done-check">✓</div>
    <h2 class="done-title">Responses Submitted</h2>
    <p class="done-sub">Thank you, ${escHtml(state.memberName||'team member')}. Your data has been saved to Airtable.</p>
  </div>
  <div class="matrix-section">
    <h3 class="section-title">Your Personal Eisenhower Matrix</h3>
    <div class="matrix-grid">
      <div class="quad quad-q1"><div class="quad-header"><span class="quad-tag">Q1</span><strong>Do First</strong><span class="quad-sub">Urgent + Important</span></div>${fn(q1)}</div>
      <div class="quad quad-q2"><div class="quad-header"><span class="quad-tag">Q2</span><strong>Schedule</strong><span class="quad-sub">Important, not urgent</span></div>${fn(q2)}</div>
      <div class="quad quad-q3"><div class="quad-header"><span class="quad-tag">Q3</span><strong>Delegate</strong><span class="quad-sub">Urgent, less important</span></div>${fn(q3)}</div>
      <div class="quad quad-q4"><div class="quad-header"><span class="quad-tag">Q4</span><strong>Deprioritise</strong><span class="quad-sub">Low urgency + importance</span></div>${fn(q4)}</div>
    </div>
  </div>
  <div style="text-align:center;margin:2rem 0">
    <a href="results.html" class="btn-primary" style="text-decoration:none;display:inline-block">View Team Results →</a>
  </div>`;
}

function startSurvey() {
  const nameInput = document.getElementById('nameInput');
  if (!nameInput || !nameInput.value.trim()) {
    nameInput.style.borderColor = '#E6007E';
    nameInput.focus();
    return;
  }
  state.memberName = nameInput.value.trim();
  state.page = 1;
  save();
  render();
}

function goPage(dir) {
  state.page = Math.max(1, Math.min(totalQuestionPages(), state.page+dir));
  save();
  render();
}

async function goSubmit() {
  const main = document.getElementById('surveyMain');
  const nav = main.querySelector('.survey-nav');
  const btn = nav && nav.querySelector('.btn-primary');
  if (btn) { btn.disabled=true; btn.textContent='Submitting…'; }

  const submittedAt = new Date().toISOString();

  // Build one Airtable record per question (Airtable max 10 per request)
  const records = QUESTIONS.map(q => {
    const a = state.answers[q.id] || {};
    return {
      fields: {
        "Member Name":  state.memberName || 'Anonymous',
        "Submitted At": submittedAt,
        "Q Number":     q.id,
        "Category":     q.cat,
        "Question":     q.text,
        "Position":     a.yn         || '',
        "Urgency":      a.urgency    ? Number(a.urgency)    : null,
        "Importance":   a.importance ? Number(a.importance) : null,
        "Quadrant":     (a.urgency && a.importance) ? getQuadrant(a.urgency, a.importance) : '',
      }
    };
  });

  const batches = [];
  for (let i=0; i<records.length; i+=10) batches.push(records.slice(i,i+10));

  let success = true;
  try {
    for (const batch of batches) {
      const res = await fetch(AIRTABLE_URL, {
        method: 'POST',
        headers: AIRTABLE_HEADERS,
        body: JSON.stringify({ records: batch })
      });
      if (!res.ok) { const err=await res.json(); console.error('Airtable error:',err); success=false; break; }
    }
  } catch(e) { console.error('Submission failed:',e); success=false; }

  if (!success) {
    if (btn) { btn.disabled=false; btn.textContent='Retry Submission'; btn.style.background='#c62828'; }
    const info = nav && nav.querySelector('.nav-info');
    if (info) info.textContent = '⚠ Submission failed — check Airtable config in js/config.js';
    return;
  }

  state.page = totalQuestionPages() + 1;
  sessionStorage.removeItem(STORAGE_KEY);
  save();
  render();
}

function setAnswer(id, field, value) {
  if (!state.answers[id]) state.answers[id] = { yn:null, urgency:null, importance:null };
  state.answers[id][field] = value;
  save();
  render();
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

render();
</script>
</body>
</html>
